name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.7.0
        with:
          access_token: ${{ github.token }}
      - name: Checkout source
        uses: actions/checkout@v2

      - name: Conda setup
        uses: conda-incubator/setup-miniconda@v2
        with:
          channels: conda-forge
          mamba-version: '*'
          python-version: ${{ matrix.python-version }}
          activate-environment: test_env_regionate
          auto-activate-base: false

      - name: Set up conda environment
        run: |
          mamba env update -f ci/environment.yml
          # TODO: drop these two explicit installs once their upstreams release the
          # required fixes to PyPI; the floors in pyproject.toml will then suffice.
          # (1) the xgcm face_connections halo-padding fix needed for correct
          #     multi-tile (lat-lon-cap / cap) padding (hdrake/xgcm pad-712), and
          # (2) the topology-driven sectionate API + 'left'/rotated-seam corner
          #     neighbour fix (MOM6-community/sectionate#47).
          python -m pip install "xgcm @ git+https://github.com/hdrake/xgcm.git@fix-faceconnection-pad-712"
          python -m pip install "sectionate @ git+https://github.com/MOM6-community/sectionate.git@refs/pull/47/head"
          python -m pip install -e .
      - name: Conda list information
        run: |
          conda env list
          conda list
      - name: Test with pytest
        run: |
          pytest
